<!DOCTYPE html>
<html lang="hy">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Արագատիպ</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/typing-game.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="pics/logo.png">
</head>

<body id="typing-game-body">
    <div class="game-container typing-container">
        <header class="game-header">
            <a href="index.html#games" class="back-button">←</a>
            <h1>Արագատիպ</h1>
            <div class="header-controls">
                <button id="keyboard-toggle" title="Toggle Native Keyboard">📱</button>
            </div>
        </header>

        <div class="stats-bar glass-panel">
            <div class="stat">
                <span class="stat-label">Ժամանակ</span>
                <span id="time-display" class="stat-value">30</span>
            </div>
            <div class="stat">
                <span class="stat-label">Արագութիւն</span>
                <span id="wpm-display" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Ճշգրտութիւն</span>
                <span id="accuracy-display" class="stat-value">100%</span>
            </div>
        </div>

        <div class="words-container glass-panel" id="words-container" style="position: relative;">
            <div id="typing-start-overlay" class="start-overlay" style="z-index: 20;">
                <h2>Ընտրէ ժամանակը</h2>
                <select id="typing-timer-select" class="level-select">
                    <option value="60">1 վայրկեան</option>
                    <option value="120" selected>2 վայրկեան</option>
                    <option value="300">5 վայրկեան</option>
                </select>
                <button id="start-typing-btn" class="start-btn">Սկսիր</button>
            </div>

            <div id="typing-result-overlay" class="start-overlay hidden" style="z-index: 30;">
                <h2 id="result-overlay-title">Աւարտ</h2>
                <div class="res-stat-card">
                    <div class="res-stat-item">
                        <span class="res-stat-label">Արագութիւն</span>
                        <span id="final-wpm" class="res-stat-value">0</span>
                    </div>
                    <div class="res-stat-item">
                        <span class="res-stat-label">Ճշգրտութիւն</span>
                        <span id="final-accuracy" class="res-stat-value">0%</span>
                    </div>
                </div>
                <select id="result-timer-select" class="level-select">
                    <option value="60">1 վայրկեան</option>
                    <option value="120" selected>2 վայրկեան</option>
                    <option value="300">5 վայրկեան</option>
                </select>
                <button id="retry-typing-btn" class="start-btn">Կրկնել</button>
            </div>
            <div id="words-display"></div>
            <div class="focus-overlay" id="focus-overlay">Սեղմէ հոս կամ սկսիր տպել</div>
        </div>

        <div id="keyboard-container" class="typing-keyboard"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/index.js"></script>
    <script src="js/words.js"></script>
    <script src="js/typing-game.js"></script>
</body>

</html>
