<!DOCTYPE html>
<html lang="hy">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Բառիկ</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/wordle.css">
</head>

<body id="wordle-game-body">
    <div class="game-container">
        <header class="game-header">
            <a href="index.html#games" class="back-button">←</a>
            <h1>Բառիկ</h1>
            <div class="header-controls">
                <button id="keyboard-toggle" title="Toggle Native Keyboard">📱</button>
            </div>
        </header>

        <div class="game-message" id="game-message"></div>

        <div id="board-container">
            <div id="wordle-start-overlay" class="start-overlay">
                <h2 style="margin-bottom: 15px;">Ընտրէ բարդութիւնը</h2>
                <select id="wordle-level-select" class="level-select" style="font-size: 16px; padding: 10px; margin: 0; width: 80%;">
                    <option value="3">Դիւրին (3 տառ)</option>
                    <option value="5" selected>Միջին (5 տառ)</option>
                    <option value="7">Դժուար (7 տառ)</option>
                </select>
                <button id="start-wordle-btn" class="start-btn">Սկսիր</button>
            </div>
            <div id="board"></div>
        </div>

        <div id="keyboard-container"></div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/index.js"></script>
    <script src="js/words.js"></script>
    <script src="js/wordle.js"></script>
</body>

</html>
